<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Lexigraph · 낱말의 별자리</title>
<meta name="description" content="유의어와 반의어를 그래프로 탐색하고 단어장으로 암기하는 Lexigraph" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #F6F2E9; overscroll-behavior: none; }
  #root { position: fixed; inset: 0; }
  #boot-error { display: none; position: fixed; inset: 0; z-index: 9999; padding: 28px 24px; box-sizing: border-box; overflow: auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #77323A; background: #F6F2E9; }
  #boot-error h1 { font-size: 18px; margin: 0 0 12px; }
  #boot-error p { font-size: 14px; color: #2C2C2C; line-height: 1.6; margin: 0 0 10px; }
  #boot-error pre { font-size: 12px; background: rgba(119,50,58,.08); padding: 12px; border-radius: 8px; white-space: pre-wrap; word-break: break-word; }
</style>
</head>
<body>
<div id="root"></div>
<div id="boot-error">
  <h1>앱을 불러오지 못했어요</h1>
  <p>아래 오류 내용과 함께 알려주시면 고쳐드릴게요. React·d3 로드를 위해 인터넷 연결이 필요합니다.</p>
  <pre id="boot-error-msg"></pre>
</div>
<script>
  function showBootError(msg){var b=document.getElementById('boot-error'),p=document.getElementById('boot-error-msg');if(b&&p){p.textContent=String(msg);b.style.display='block';}}
  window.addEventListener('error',function(e){showBootError((e.error&&e.error.stack)||e.message||(e.filename+':'+e.lineno));});
  window.addEventListener('load',function(){if(!window.React)showBootError('React 로드 실패 — 인터넷 연결 또는 CDN 접근을 확인해 주세요.');else if(!window.ReactDOM)showBootError('ReactDOM 로드 실패 — 인터넷 연결을 확인해 주세요.');else if(!window.d3)showBootError('d3 로드 실패 — 인터넷 연결 또는 CDN 접근을 확인해 주세요.');});
</script>
<script>
try {
const {
  useState,
  useEffect,
  useRef,
  useCallback
} = React;

/* ────────────────────────────────────────────────
   LEXIGRAPH — 유의어·반의어 그래프 단어장
   Free Dictionary API (+ Claude 폴백) · d3-force · Glassmorphism
──────────────────────────────────────────────── */

const C = {
  bg: "#F6F2E9",
  ink: "#2C2C2C",
  faint: "#8D8674",
  syn: "#77323A",
  // burgundy — 유의어 / 핵심 UI
  ant: "#3E5A7E",
  // slate navy — 반의어
  hairline: "rgba(140,130,110,.22)"
};
const SERIF = `'Cormorant Garamond','Noto Serif KR',Georgia,'Times New Roman',serif`;

/* 글래스 패널 공통 스타일 */
const glass = (alpha = 0.52, blur = 18) => ({
  background: `rgba(255,255,255,${alpha})`,
  backdropFilter: `blur(${blur}px) saturate(1.5)`,
  WebkitBackdropFilter: `blur(${blur}px) saturate(1.5)`,
  border: "1px solid rgba(255,255,255,.72)"
});

/* ───────────── persistence (localStorage) ───────────── */
function loadBooks() {
  try {
    const raw = localStorage.getItem("lexigraph-books");
    return raw ? JSON.parse(raw) : [];
  } catch {
    return [];
  }
}
function saveBooks(books) {
  try {
    localStorage.setItem("lexigraph-books", JSON.stringify(books));
  } catch {}
}

/* ───────────── 설정(config) persistence ─────────────
   provider: 'openai' | 'dictionary' · openaiKey */
function loadConfig() {
  try {
    const raw = localStorage.getItem("lexigraph-config");
    const c = raw ? JSON.parse(raw) : {};
    return {
      provider: c.provider || "openai",
      openaiKey: c.openaiKey || ""
    };
  } catch {
    return {
      provider: "openai",
      openaiKey: ""
    };
  }
}
function saveConfig(cfg) {
  try {
    localStorage.setItem("lexigraph-config", JSON.stringify(cfg));
  } catch {}
}

/* ───────────── 데이터 소스 ─────────────
   요청을 2가지로 분리해 크레딧을 아낀다.
     · fetchGraph(word)  : 검색 시 1회 — 한국어 뜻 + 유의어/반의어
     · fetchDetail(word) : 노드 탭 시 — 한국어 뜻 + 영/한 예문
   provider: 'openai'(주력, gpt-4o-mini) | 'dictionary'(Free Dictionary, 레거시) */

/* 세션 캐시 — 같은 단어를 다시 요청하지 않도록 */
const graphCache = new Map();
const detailCache = new Map();
const ck = (provider, word) => `${provider}:${word}`;

/* 요청이 무한 대기하지 않도록 타임아웃 부여 */
function fetchWithTimeout(url, opts = {}, ms = 30000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, {
    ...opts,
    signal: ctrl.signal
  }).finally(() => clearTimeout(t));
}
function dedupe(word, arr, extraDrop = []) {
  const seen = new Set([word, ...extraDrop]);
  const out = [];
  (arr || []).forEach(raw => {
    const w = String(raw || "").trim();
    const key = w.toLowerCase();
    if (w && !seen.has(key)) {
      seen.add(key);
      out.push(w);
    }
  });
  return out;
}

/* ── OpenAI (gpt-4o-mini) ── */
async function openaiJSON(cfg, system, word) {
  if (!cfg.openaiKey) throw new Error("apikey");
  const res = await fetchWithTimeout("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${cfg.openaiKey}`
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      response_format: {
        type: "json_object"
      },
      temperature: 0.3,
      messages: [{
        role: "system",
        content: system
      }, {
        role: "user",
        content: word
      }]
    })
  }, 30000);
  if (res.status === 401) throw new Error("apikey");
  if (!res.ok) throw new Error("network");
  const data = await res.json();
  const text = data?.choices?.[0]?.message?.content || "";
  return JSON.parse(text);
}
const SYS_GRAPH = "You are a strict JSON API for an English vocabulary service. " + "Return RAW JSON only — no markdown, no commentary. " + "For the given English word, give its core Korean meaning plus all relevant synonyms and antonyms (empty array if none). " + 'Format: {"word":"","meaning":"대표 한국어 뜻(여러개면 쉼표로 구분)","synonyms":[],"antonyms":[]}';
const SYS_DETAIL = "You are a strict JSON API for an English vocabulary service. " + "Return RAW JSON only — no markdown, no commentary. " + "For the given English word, give its core Korean meaning and exactly 2 distinct example sentences for CEFR B1-B2 learners, each with a natural Korean translation. " + 'Format: {"word":"","meaning":"대표 한국어 뜻(여러개면 쉼표로 구분)","examples":[{"en":"","ko":""},{"en":"","ko":""}]}';
async function graphOpenAI(word, cfg) {
  const j = await openaiJSON(cfg, SYS_GRAPH, word);
  return {
    word: j.word || word,
    meaning: j.meaning || "",
    phonetic: "",
    synonyms: dedupe(word, j.synonyms),
    antonyms: dedupe(word, j.antonyms)
  };
}
async function detailOpenAI(word, cfg) {
  const j = await openaiJSON(cfg, SYS_DETAIL, word);
  return {
    word: j.word || word,
    meaning: j.meaning || "",
    phonetic: "",
    examples: (j.examples || []).filter(e => e && e.en).slice(0, 2).map(e => ({
      en: e.en,
      ko: e.ko || ""
    }))
  };
}

/* ── Free Dictionary API (레거시) ── */
async function dictRaw(word) {
  const res = await fetchWithTimeout(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`, {}, 5000);
  if (!res.ok) throw new Error("not-found");
  return res.json();
}
function parseDict(data) {
  const syn = [],
    ant = [],
    defs = [];
  data.forEach(entry => (entry.meanings || []).forEach(m => {
    (m.synonyms || []).forEach(s => syn.push(s));
    (m.antonyms || []).forEach(a => ant.push(a));
    (m.definitions || []).forEach(d => {
      defs.push({
        pos: m.partOfSpeech,
        def: d.definition,
        example: d.example || null
      });
      (d.synonyms || []).forEach(s => syn.push(s));
      (d.antonyms || []).forEach(a => ant.push(a));
    });
  }));
  const ph = data[0].phonetic || (data[0].phonetics || []).find(p => p.text)?.text || "";
  return {
    word: data[0].word,
    phonetic: ph,
    defs,
    syn,
    ant
  };
}
async function graphDictionary(word) {
  try {
    const p = parseDict(await dictRaw(word));
    return {
      word: p.word,
      meaning: p.defs[0]?.def || "",
      phonetic: p.phonetic,
      synonyms: dedupe(word, p.syn).slice(0, 6),
      antonyms: dedupe(word, p.ant, p.syn).slice(0, 6)
    };
  } catch (e) {
    const o = offlineEntry(word);
    if (o) return {
      word,
      meaning: o.def,
      phonetic: o.ph,
      synonyms: o.syn.slice(0, 6),
      antonyms: o.ant.slice(0, 6),
      offline: true
    };
    throw e;
  }
}
async function detailDictionary(word) {
  try {
    const p = parseDict(await dictRaw(word));
    const examples = p.defs.filter(d => d.example).slice(0, 2).map(d => ({
      en: d.example,
      ko: ""
    }));
    return {
      word: p.word,
      meaning: p.defs[0]?.def || "",
      phonetic: p.phonetic,
      examples
    };
  } catch (e) {
    const o = offlineEntry(word);
    if (o) return {
      word,
      meaning: o.def,
      phonetic: o.ph,
      examples: [{
        en: o.ex,
        ko: ""
      }],
      offline: true
    };
    throw e;
  }
}

/* ── 통합 진입점 (캐시 경유) ── */
async function fetchGraph(word, cfg) {
  const w = word.trim().toLowerCase();
  const key = ck(cfg.provider, w);
  if (graphCache.has(key)) return graphCache.get(key);
  const data = cfg.provider === "openai" ? await graphOpenAI(w, cfg) : await graphDictionary(w);
  graphCache.set(key, data);
  return data;
}
async function fetchDetail(word, cfg) {
  const w = word.trim().toLowerCase();
  const key = ck(cfg.provider, w);
  if (detailCache.has(key)) return detailCache.get(key);
  const data = cfg.provider === "openai" ? await detailOpenAI(w, cfg) : await detailDictionary(w);
  detailCache.set(key, data);
  return data;
}

/* ── 내장 오프라인 미니 사전 (dictionary 모드에서 네트워크가 막혔을 때) ──
   [발음, 품사, 뜻, 예문, 유의어, 반의어] */
const OFFLINE = {
  happy: ["/ˈhæpi/", "adjective", "feeling or showing pleasure or contentment", "She looked happy when she heard the news.", ["glad", "joyful", "cheerful", "content", "delighted", "merry"], ["sad", "unhappy", "miserable", "gloomy"]],
  sad: ["/sæd/", "adjective", "feeling or showing sorrow; unhappy", "He felt sad after saying goodbye.", ["unhappy", "sorrowful", "gloomy", "miserable", "downcast"], ["happy", "cheerful", "joyful"]],
  big: ["/bɪɡ/", "adjective", "of considerable size or extent", "They live in a big house by the sea.", ["large", "huge", "enormous", "vast", "giant", "immense"], ["small", "tiny", "little"]],
  small: ["/smɔːl/", "adjective", "of a size that is less than normal", "A small bird landed on the fence.", ["little", "tiny", "minute", "petite", "compact"], ["big", "large", "huge"]],
  fast: ["/fæst/", "adjective", "moving or capable of moving at high speed", "The fast train reaches Busan in two hours.", ["quick", "rapid", "swift", "speedy", "brisk"], ["slow", "sluggish"]],
  slow: ["/sloʊ/", "adjective", "moving or operating at a low speed", "Traffic was slow during the storm.", ["sluggish", "unhurried", "leisurely", "gradual"], ["fast", "quick", "rapid"]],
  hot: ["/hɑːt/", "adjective", "having a high degree of heat", "Be careful — the soup is very hot.", ["warm", "boiling", "scorching", "heated"], ["cold", "cool", "freezing"]],
  cold: ["/koʊld/", "adjective", "of or at a low temperature", "A cold wind blew across the field.", ["chilly", "freezing", "icy", "cool", "frosty"], ["hot", "warm"]],
  good: ["/ɡʊd/", "adjective", "of high quality; satisfactory", "She did a good job on the report.", ["fine", "excellent", "great", "superb", "decent"], ["bad", "poor", "awful"]],
  bad: ["/bæd/", "adjective", "of poor quality or low standard", "The movie got bad reviews.", ["poor", "awful", "terrible", "dreadful", "inferior"], ["good", "excellent"]],
  strong: ["/strɔːŋ/", "adjective", "having great physical power or force", "You need strong arms to row a boat.", ["powerful", "sturdy", "tough", "robust", "mighty"], ["weak", "feeble"]],
  weak: ["/wiːk/", "adjective", "lacking physical strength or energy", "He felt weak after the long illness.", ["feeble", "frail", "fragile", "faint"], ["strong", "powerful"]],
  bright: ["/braɪt/", "adjective", "giving out or reflecting much light", "The room was bright with morning sun.", ["brilliant", "radiant", "vivid", "luminous", "shining"], ["dark", "dim", "dull"]],
  dark: ["/dɑːrk/", "adjective", "with little or no light", "The path grew dark as night fell.", ["dim", "gloomy", "shadowy", "murky"], ["bright", "light"]],
  easy: ["/ˈiːzi/", "adjective", "achieved without great effort", "The test was easier than expected.", ["simple", "effortless", "straightforward", "smooth"], ["hard", "difficult"]],
  hard: ["/hɑːrd/", "adjective", "requiring a great deal of effort; solid and firm", "Learning a language is hard but rewarding.", ["difficult", "tough", "demanding", "arduous", "firm"], ["easy", "soft", "simple"]],
  beautiful: ["/ˈbjuːtɪfl/", "adjective", "pleasing the senses or mind aesthetically", "We watched a beautiful sunset.", ["lovely", "gorgeous", "pretty", "stunning", "elegant"], ["ugly", "plain"]],
  brave: ["/breɪv/", "adjective", "ready to face danger or pain; showing courage", "The brave firefighter entered the burning house.", ["courageous", "bold", "fearless", "valiant", "daring"], ["cowardly", "timid"]],
  calm: ["/kɑːm/", "adjective", "not showing or feeling nervousness or anger", "She stayed calm during the interview.", ["peaceful", "serene", "tranquil", "composed", "quiet"], ["agitated", "anxious", "stormy"]],
  angry: ["/ˈæŋɡri/", "adjective", "feeling or showing strong annoyance", "He was angry about the broken promise.", ["furious", "irate", "annoyed", "enraged", "cross"], ["calm", "pleased"]],
  rich: ["/rɪtʃ/", "adjective", "having a great deal of money or assets", "The city grew rich from trade.", ["wealthy", "affluent", "prosperous", "opulent"], ["poor", "broke"]],
  poor: ["/pʊr/", "adjective", "lacking sufficient money; of low quality", "They were too poor to travel.", ["needy", "impoverished", "destitute", "broke"], ["rich", "wealthy"]],
  old: ["/oʊld/", "adjective", "having lived or existed for a long time", "An old clock hung on the wall.", ["ancient", "aged", "elderly", "antique"], ["new", "young", "modern"]],
  new: ["/nuː/", "adjective", "produced or discovered recently", "She bought a new phone yesterday.", ["fresh", "modern", "novel", "recent", "current"], ["old", "ancient"]],
  quiet: ["/ˈkwaɪət/", "adjective", "making little or no noise", "The library was quiet in the morning.", ["silent", "hushed", "still", "peaceful", "calm"], ["loud", "noisy"]],
  loud: ["/laʊd/", "adjective", "producing much noise", "The music was too loud to talk over.", ["noisy", "deafening", "booming", "thunderous"], ["quiet", "soft"]],
  smart: ["/smɑːrt/", "adjective", "having quick intelligence", "She's smart enough to solve it alone.", ["clever", "intelligent", "bright", "sharp", "brilliant"], ["stupid", "foolish", "dull"]],
  vivid: ["/ˈvɪvɪd/", "adjective", "producing powerful, clear images in the mind", "He gave a vivid description of the festival.", ["bright", "brilliant", "colorful", "striking", "graphic"], ["dull", "faded", "vague"]],
  begin: ["/bɪˈɡɪn/", "verb", "to start; to perform the first part of an action", "The concert will begin at eight.", ["start", "commence", "initiate", "launch"], ["end", "finish", "stop"]],
  end: ["/end/", "verb", "to come or bring to a final point", "The story ends with a surprise.", ["finish", "conclude", "terminate", "close"], ["begin", "start"]],
  love: ["/lʌv/", "verb", "to feel deep affection for someone or something", "They love hiking in autumn.", ["adore", "cherish", "treasure", "admire"], ["hate", "despise"]],
  hate: ["/heɪt/", "verb", "to feel intense dislike for", "I hate waiting in long lines.", ["despise", "loathe", "detest", "abhor"], ["love", "adore"]]
};
function offlineEntry(word) {
  const e = OFFLINE[word];
  if (!e) return null;
  const [ph, pos, def, ex, syn, ant] = e;
  return {
    ph,
    pos,
    def,
    ex,
    syn: dedupe(word, syn),
    ant: dedupe(word, ant, syn)
  };
}

/* ───────────── 그래프 뷰 ───────────── */
function GraphView({
  data,
  filter,
  onNodeTap
}) {
  const wrapRef = useRef(null);
  const nodeEls = useRef(new Map());
  const linkEls = useRef([]);
  const simRef = useRef(null);
  const nodesRef = useRef([]);
  const dragRef = useRef(null);
  const nodes = React.useMemo(() => {
    const cw = 34 + data.word.length * 11;
    return [{
      id: data.word,
      kind: "center",
      w: cw,
      r: cw / 2 + 8
    }, ...data.synonyms.map(s => {
      const w = 26 + s.length * 8.2;
      return {
        id: s,
        kind: "syn",
        w,
        r: w / 2 + 7
      };
    }), ...data.antonyms.map(a => {
      const w = 26 + a.length * 8.2;
      return {
        id: a,
        kind: "ant",
        w,
        r: w / 2 + 7
      };
    })];
  }, [data]);
  const links = React.useMemo(() => nodes.filter(n => n.kind !== "center").map(n => ({
    source: data.word,
    target: n.id,
    kind: n.kind
  })), [nodes, data.word]);
  useEffect(() => {
    const el = wrapRef.current;
    if (!el) return;
    const W = el.clientWidth,
      H = el.clientHeight;
    nodes.forEach((n, i) => {
      if (n.kind === "center") {
        n.x = W / 2;
        n.y = H / 2;
      } else {
        const a = i / nodes.length * Math.PI * 2;
        n.x = W / 2 + Math.cos(a) * 120;
        n.y = H / 2 + Math.sin(a) * 120;
      }
    });
    nodesRef.current = nodes;
    const sim = d3.forceSimulation(nodes).force("link", d3.forceLink(links).id(d => d.id).distance(l => l.kind === "syn" ? 105 : 150).strength(0.5)).force("charge", d3.forceManyBody().strength(-220)).force("collide", d3.forceCollide(d => d.r).iterations(2)).force("x", d3.forceX(W / 2).strength(d => d.kind === "center" ? 0.22 : 0.03)).force("y", d3.forceY(H / 2).strength(d => d.kind === "center" ? 0.22 : 0.035)).velocityDecay(0.32).alpha(1);
    sim.on("tick", () => {
      const w = el.clientWidth,
        h = el.clientHeight;
      nodes.forEach(n => {
        n.x = Math.max(n.r, Math.min(w - n.r, n.x));
        n.y = Math.max(n.r + 4, Math.min(h - n.r, n.y));
        const dom = nodeEls.current.get(n.id);
        if (dom) dom.style.transform = `translate(${n.x}px,${n.y}px) translate(-50%,-50%)`;
      });
      links.forEach((l, i) => {
        const dom = linkEls.current[i];
        if (dom) {
          dom.setAttribute("x1", l.source.x);
          dom.setAttribute("y1", l.source.y);
          dom.setAttribute("x2", l.target.x);
          dom.setAttribute("y2", l.target.y);
        }
      });
    });
    simRef.current = sim;
    return () => sim.stop();
  }, [nodes, links]);
  const onDown = useCallback((e, id) => {
    const n = nodesRef.current.find(d => d.id === id);
    if (!n) return;
    e.currentTarget.setPointerCapture(e.pointerId);
    dragRef.current = {
      n,
      sx: e.clientX,
      sy: e.clientY,
      lx: e.clientX,
      ly: e.clientY,
      vx: 0,
      vy: 0,
      t: performance.now(),
      moved: false
    };
    n.fx = n.x;
    n.fy = n.y;
    simRef.current?.alphaTarget(0.28).restart();
  }, []);
  const onMove = useCallback(e => {
    const d = dragRef.current;
    if (!d) return;
    const now = performance.now();
    const dx = e.clientX - d.lx,
      dy = e.clientY - d.ly;
    const dt = Math.max(now - d.t, 1);
    d.vx = dx / dt * 16;
    d.vy = dy / dt * 16;
    d.lx = e.clientX;
    d.ly = e.clientY;
    d.t = now;
    d.n.fx += dx;
    d.n.fy += dy;
    if (Math.hypot(e.clientX - d.sx, e.clientY - d.sy) > 6) d.moved = true;
  }, []);
  const onUp = useCallback((e, id) => {
    const d = dragRef.current;
    if (!d) return;
    dragRef.current = null;
    simRef.current?.alphaTarget(0);
    const clamp = v => Math.max(-14, Math.min(14, v));
    d.n.vx = clamp(d.vx * 1.4); // 살짝 관성
    d.n.vy = clamp(d.vy * 1.4);
    d.n.fx = null;
